name: Publish binaries

on:
  push:
    branches: [main]
    paths:
      - binaries.json
      - '*.sh'
      - '*.py'
      - 'licenses/**'
  schedule:
    - cron: '0 9 * * 1'   # Weekly: Monday 9am UTC
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq unzip xz-utils

      - name: Update binaries
        run: ./update.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test
        run: |
          tool_count=$(jq '.tools | length' binaries.lock.json)
          echo "Tools in lock: $tool_count"
          [[ "$tool_count" -ge 5 ]] || { echo "ERROR: expected >= 5 tools"; exit 1; }
          # Every tool has at least one asset
          empty=$(jq -r '.tools[] | select((.assets | length) == 0) | .name' binaries.lock.json)
          [[ -z "$empty" ]] || { echo "ERROR: tool with zero assets: $empty"; exit 1; }

      - name: Set up Java for signing
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sign Windows binaries (Azure Trusted Signing)
        run: ./sign-windows.sh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}

      - name: Upload prepared binaries
        uses: actions/upload-artifact@v4
        with:
          name: crossbins-prepared
          path: |
            binaries.json
            binaries.lock.json
            README.md
            output/**

  macos-sign:
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared binaries
        uses: actions/download-artifact@v4
        with:
          name: crossbins-prepared
          path: .

      - name: Check macOS signing secrets
        run: |
          missing=0
          for name in APPLEID APPLEIDPASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "ERROR: missing macOS signing secret mapped to $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          APPLEID: ${{ secrets.ELECTRON_PUBLISH_APPLE_ID }}
          APPLEIDPASSWORD: ${{ secrets.ELECTRON_PUBLISH_APPLEID_KEY }}
          APPLE_TEAM_ID: ${{ secrets.ELECTRON_APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.ELECTRON_PUBLISH_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.ELECTRON_PUBLISH_CSC_KEY_PASSWORD }}

      - name: Sign and notarize macOS binaries
        run: ./sign-macos.sh
        env:
          APPLEID: ${{ secrets.ELECTRON_PUBLISH_APPLE_ID }}
          APPLEIDPASSWORD: ${{ secrets.ELECTRON_PUBLISH_APPLEID_KEY }}
          APPLE_TEAM_ID: ${{ secrets.ELECTRON_APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.ELECTRON_PUBLISH_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.ELECTRON_PUBLISH_CSC_KEY_PASSWORD }}

      - name: Upload signed binaries
        uses: actions/upload-artifact@v4
        with:
          name: crossbins-signed
          path: |
            binaries.json
            binaries.lock.json
            README.md
            output/**

  publish:
    runs-on: macos-latest
    needs: macos-sign
    steps:
      - uses: actions/checkout@v4

      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: crossbins-signed
          path: .

      - name: Install dependencies
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi

      - name: Publish releases
        run: ./publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.ELECTRON_APPLE_TEAM_ID }}

      - name: Commit lock file and README
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binaries.lock.json README.md binaries.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update binaries to latest versions"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: [prepare, macos-sign, publish]
    if: ${{ always() && (needs.prepare.result == 'failure' || needs.macos-sign.result == 'failure' || needs.publish.result == 'failure') }}
    steps:
      - name: Create issue on failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --label "automation" --state open --limit 1 --json number -q '.[0].number // empty')
          body=$(cat <<BODY
          Binary publish failed as of $(date +%Y-%m-%d).

          Results:
          - prepare: ${{ needs.prepare.result }}
          - macos-sign: ${{ needs.macos-sign.result }}
          - publish: ${{ needs.publish.result }}

          View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY
          )
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "Binary update failed ($(date +%Y-%m-%d))" \
              --body "$body" \
              --label "automation"
          fi
